appId: com.filework.desktop
productName: FileWork
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - node_modules/@filework/native/**/*
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  darkModeSupport: true
dmg:
  artifactName: FileWork-${version}-${arch}.dmg
