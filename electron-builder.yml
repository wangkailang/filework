appId: com.filework.desktop
productName: FileWork
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  # @filework/native is a pnpm-symlinked workspace package. electron-builder
  # auto-collects production deps in full (following the symlink), so exclude
  # the ~255MB Cargo target/ build tree and the Rust sources — only the .node,
  # index.js, and package.json are needed at runtime.
  - "!node_modules/@filework/native/target/**/*"
  - "!node_modules/@filework/native/src/**/*"
  - "!node_modules/@filework/native/build.rs"
  - "!node_modules/@filework/native/Cargo.toml"
  - "!node_modules/@filework/native/Cargo.lock"
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.productivity
  # arm64 only: the @filework/native addon is local-compiled for the host arch.
  # x64 is deferred until cross-compiled .node binaries are produced (see
  # docs/superpowers/specs/2026-05-25-filework-native-dedup-design.md). Shipping
  # an x64 build now would crash on boot — the addon would fail to load.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: build/icon.icns
  darkModeSupport: true
dmg:
  artifactName: FileWork-${version}-${arch}.dmg
